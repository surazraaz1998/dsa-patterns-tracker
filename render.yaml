services:
  - type: web
    name: dsa-patterns-tracker-backend
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dsa-patterns-tracker-db
          property: connectionString
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

databases:
  - name: dsa-patterns-tracker-db
    databaseName: dsa_tracker
    user: dsa_tracker
    plan: free
